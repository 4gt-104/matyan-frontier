# Tag release: publish wheel + sdist to Test PyPI, then build and push the production
# Docker image (installs matyan-frontier from Test PyPI).
#
# Uses OIDC Trusted Publisher — no API token secret required for Test PyPI.
# One-time setup on Test PyPI:
#   1. Go to https://test.pypi.org/manage/account/publishing/
#   2. Add a new pending publisher:
#      - PyPI project name : matyan-frontier
#      - Owner             : <your-github-org-or-username>
#      - Repository        : matyan-core   (the repo that holds this file)
#      - Workflow name     : release.yml
#      - Environment name  : test-pypi
#
# The "test-pypi" GitHub environment can optionally have branch/tag
# protection rules to restrict which refs are allowed to publish.
#
# Docker Hub (for the docker job):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# If you previously used pypi-publish.yml for Trusted Publishing, update the
# pending publisher on Test PyPI to use workflow name release.yml.

name: Release (Test PyPI + Docker)

on:
  push:
    tags:
      - '**'

env:
  IMAGE_NAME: matyan-frontier

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # setuptools-scm derives the version from git tags; full history is required
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to Test PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      # Required for OIDC Trusted Publisher authentication
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  docker-build-and-push:
    name: Docker build and push
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Wait for Test PyPI index propagation
        run: sleep 45

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
