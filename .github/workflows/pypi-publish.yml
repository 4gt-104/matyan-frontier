# Build and publish wheel + sdist to Test PyPI on tag creation.
#
# Uses OIDC Trusted Publisher — no API token secret required.
# One-time setup on Test PyPI:
#   1. Go to https://test.pypi.org/manage/account/publishing/
#   2. Add a new pending publisher:
#      - PyPI project name : matyan-frontier
#      - Owner             : <your-github-org-or-username>
#      - Repository        : matyan-core   (the repo that holds this file)
#      - Workflow name     : pypi-publish.yml
#      - Environment name  : test-pypi
#
# The "test-pypi" GitHub environment can optionally have branch/tag
# protection rules to restrict which refs are allowed to publish.

name: Publish to Test PyPI

on:
  push:
    tags:
      - '**'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # setuptools-scm derives the version from git tags; full history is required
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to Test PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      # Required for OIDC Trusted Publisher authentication
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
